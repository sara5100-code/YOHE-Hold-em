<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOHE Hold'em</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#eef2f8;--panel:#ffffff;--panel2:#f4f7fd;--border:#dbe3f0;
  --text:#1a2840;--dim:#7d96b5;--accent:#3d6cf0;
  --green:#22a46c;--red:#e04848;--gold:#7a6010;--orange:#d87020;
  --felt:#1c5545;--felt2:#154438;--felt3:#0f3028;
  --wood:#1a2c50;--wood2:#111e38;
  --shadow:0 2px 12px rgba(26,40,80,.09);--shadow-md:0 6px 28px rgba(26,40,80,.14);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic UI','Meiryo',sans-serif;height:100dvh;overflow:hidden;user-select:none;}
.screen{display:none;width:100%;height:100dvh;}
.screen.active{display:flex;}
.hidden{display:none!important;}

/* ===== セットアップ画面 ===== */
#setup-screen{align-items:center;justify-content:center;flex-direction:column;gap:20px;background:linear-gradient(160deg,#e6ecf8 0%,#eef2fc 50%,#e4eaf8 100%);}
.setup-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:32px 40px;width:480px;max-width:95vw;box-shadow:var(--shadow-md);}
.setup-card h1{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin-bottom:3px;letter-spacing:.03em;}
.setup-card .sub{font-size:12px;color:var(--dim);text-align:center;margin-bottom:24px;}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-row label{font-size:12px;color:var(--dim);font-weight:600;letter-spacing:.04em;}
.form-row select{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;}
.form-row select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,108,240,.10);}
.blind-row{display:flex;gap:10px;}
.blind-row .form-row{flex:1;}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:background .15s,transform .1s;}
.btn-primary:hover{background:#2d58e0;}
.btn-primary:active{transform:scale(.98);}

/* ===== HUD ===== */
#game-screen{flex-direction:column;overflow:hidden;}
#game-screen.active{display:flex;}
#hud{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;height:46px;box-shadow:0 1px 6px rgba(26,40,80,.07);}
#hud .hud-title{font-weight:800;color:var(--text);font-size:14px;letter-spacing:.04em;}
#hud-info{font-size:12px;color:var(--dim);}
.hud-btns{display:flex;gap:6px;}
.hud-btn{padding:5px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.hud-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ===== メインレイアウト（縦画面基本） ===== */
#main-area{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#table-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 12px 0;position:relative;min-height:0;}
#table-container{position:relative;width:100%;max-width:680px;aspect-ratio:1.8/1;flex-shrink:0;}

/* ===== テーブル ===== */
#table-felt{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 42%,var(--felt) 0%,var(--felt2) 58%,var(--felt3) 100%);
  border-radius:50%;
  border:9px solid var(--wood);
  box-shadow:0 0 0 3px var(--wood2),0 14px 44px rgba(10,20,60,.28),inset 0 0 28px rgba(0,0,0,.18);
}
#center-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;}
#pot-display{background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:4px 14px;font-size:13px;color:#f0d880;font-weight:700;}
#community-cards{display:flex;gap:5px;}
#stage-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1.5px;}

/* ===== シート ===== */
.seat{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;width:110px;}
.seat-info{background:rgba(244,247,255,.93);border:1px solid rgba(219,227,240,.9);border-radius:10px;padding:5px 8px;text-align:center;width:100%;position:relative;box-shadow:0 2px 10px rgba(26,40,80,.13);}
.seat.active-seat .seat-info{border-color:var(--gold);box-shadow:0 0 0 2px rgba(122,96,16,.28),0 3px 10px rgba(26,40,80,.15);}
.seat.folded-seat .seat-info{opacity:.36;}
.seat.winner-seat .seat-info{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,164,108,.28);}
.seat-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#111;}
.seat-chips{font-size:13px;font-weight:800;color:#6b4e08;}
.seat-bet{font-size:10px;color:var(--orange);min-height:13px;}
.seat-pos-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;display:inline-block;margin-bottom:2px;}
.badge-d{background:#8b5cf6;color:#fff;}.badge-sb{background:#2563eb;color:#fff;}.badge-bb{background:#059669;color:#fff;}
.badge-utg{background:#dc2626;color:#fff;}.badge-utg1{background:#ea580c;color:#fff;}
.badge-mp{background:#b45309;color:#fff;}.badge-hj{background:#0e7490;color:#fff;}
.badge-co{background:#0369a1;color:#fff;}.badge-lj{background:#0f766e;color:#fff;}
.dealer-marker{position:absolute;top:3px;right:3px;width:16px;height:16px;background:#2a4090;border-radius:50%;font-size:8px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25);letter-spacing:-0.5px;}
.hole-cards{display:flex;gap:2px;}

/* ===== カード ===== */
.card{width:32px;height:48px;background:#fff;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:1px solid #dde3ef;box-shadow:0 1px 5px rgba(26,40,80,.14);line-height:1;}
.card.big{width:58px;height:84px;font-size:23px;border-radius:8px;}
.card.back{background:linear-gradient(135deg,#1e3a7a 25%,#2a52a8 50%,#1e3a7a 75%);border:1px solid #2a4898;}
.card.back::after{content:'';display:block;width:24px;height:36px;border:2px solid rgba(255,255,255,.2);border-radius:3px;}
.card.big.back::after{width:42px;height:62px;}
.card.red{color:#cc1111;}.card.black{color:#111;}
.c-card{width:60px;height:86px;border-radius:8px;font-size:24px;font-weight:800;border:1px solid #dde3ef;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 2px 9px rgba(26,40,80,.17);background:#fff;line-height:1;}
.c-card.red{color:#cc1111;}.c-card.black{color:#111;}
.c-card.placeholder{background:rgba(0,0,0,.22);border:2px dashed rgba(255,255,255,.15);}

/* ===== プレイヤーエリア（縦画面で静的配置） ===== */
#human-area{
  position:static;
  display:flex;flex-direction:column;align-items:center;
  width:100%;
  padding:10px 16px 14px;
  background:var(--panel);
  border-top:1px solid var(--border);
  flex-shrink:0;
  gap:7px;
  box-shadow:0 -2px 12px rgba(26,40,80,.06);
}
#human-cards-row{display:flex;gap:10px;align-items:center;}
#human-cards{display:flex;gap:7px;}
#human-hand-name{font-size:11px;color:var(--gold);font-weight:600;min-height:14px;}
#action-area{display:flex;flex-direction:column;align-items:center;gap:6px;}
#quick-btns{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;}
.qbtn{padding:5px 11px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.qbtn:hover{border-color:var(--gold);color:var(--gold);}
.qbtn.active-q{border-color:var(--gold);color:var(--gold);background:rgba(122,96,16,.08);}
#main-btns{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;}
.action-btn{padding:9px 18px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;min-width:80px;font-family:inherit;transition:all .15s;}
.action-btn:disabled{opacity:.3;cursor:not-allowed;}
.action-btn:not(:disabled):active{transform:scale(.97);}
#btn-fold{background:#fff0f1;color:#e04848;border:1.5px solid #f9c8cb;}
#btn-fold:hover:not(:disabled){background:#ffe0e2;border-color:#e04848;}
#btn-check{background:#eff4ff;color:#3d6cf0;border:1.5px solid #c6d6fc;}
#btn-check:hover:not(:disabled){background:#e0ecfe;border-color:#3d6cf0;}
#btn-call{background:#edf8f3;color:#22a46c;border:1.5px solid #bae6d3;}
#btn-call:hover:not(:disabled){background:#d8f2e7;border-color:#22a46c;}
#btn-raise{background:#fdf8ee;color:#c8921e;border:1.5px solid #f0d898;}
#btn-raise:hover:not(:disabled){background:#faf0d8;border-color:#c8921e;}
#btn-allin{background:#fff2f2;color:#e04848;border:1.5px solid #f8c4c4;}
#btn-allin:hover:not(:disabled){background:#ffe2e2;border-color:#e04848;}
.raise-ctrl{display:flex;gap:5px;align-items:center;}
#raise-slider{width:110px;accent-color:var(--gold);}
#raise-amount{background:var(--panel2);border:1px solid var(--border);color:var(--gold);padding:5px 8px;border-radius:8px;font-size:13px;font-weight:700;width:72px;text-align:center;font-family:inherit;}
#to-call-label{font-size:11px;color:var(--dim);}

/* ===== サイドパネル（縦画面では下部） ===== */
#side-panel{width:100%;display:flex;flex-direction:column;border-top:1px solid var(--border);background:var(--panel);overflow:hidden;flex-shrink:0;max-height:148px;}
#side-tabs{display:none;}
.side-tab{flex:1;padding:9px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;}
.side-tab.active{color:var(--text);border-color:var(--accent);}
#side-content{flex:1;overflow-y:auto;padding:10px 12px;}
#side-content::-webkit-scrollbar{width:3px;}
#side-content::-webkit-scrollbar-thumb{background:var(--border);}
.hand-history-item{background:var(--panel2);border-radius:8px;padding:9px;margin-bottom:6px;font-size:11px;border:1px solid var(--border);cursor:pointer;transition:border-color .15s;}
.hand-history-item:hover{border-color:var(--accent);}
.hh-title{font-weight:700;color:var(--text);margin-bottom:3px;}
.hh-win{color:#186b45;font-weight:700;}.hh-loss{color:#c03030;font-weight:700;}
.gto-tip{background:var(--panel2);border-radius:8px;padding:9px 11px;margin-bottom:7px;font-size:11px;border-left:3px solid var(--accent);line-height:1.55;}
.gto-tip .tip-title{font-weight:700;color:var(--accent);margin-bottom:3px;}
.ai-roster{display:flex;flex-direction:column;gap:5px;}
.ai-row{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--panel2);border-radius:8px;border:1px solid var(--border);}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.ai-row-name{font-size:12px;font-weight:700;color:var(--text);}
.ai-row-style{font-size:10px;color:var(--dim);margin-top:1px;}
.ai-row-desc{font-size:10px;color:var(--dim);margin-top:2px;line-height:1.4;}

/* ===== 分析モーダル ===== */
#analysis-modal{display:none;position:fixed;inset:0;background:rgba(16,24,52,.55);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
#analysis-modal.open{display:flex;}
#analysis-box{background:var(--panel);border:1px solid var(--border);border-radius:20px;width:680px;max-width:96vw;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md);}
#analysis-box::-webkit-scrollbar{width:3px;}
#analysis-box::-webkit-scrollbar-thumb{background:var(--border);}
#analysis-box h2{font-size:18px;font-weight:800;color:var(--text);margin-bottom:3px;}
.analysis-sub{font-size:12px;color:var(--dim);margin-bottom:18px;}
.analysis-section{margin-bottom:18px;}
.analysis-section h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:7px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.decision-row{display:flex;gap:8px;align-items:flex-start;padding:8px;border-radius:8px;margin-bottom:5px;background:var(--panel2);font-size:11px;border:1px solid var(--border);}
.dr-street{font-weight:700;color:var(--dim);min-width:48px;text-transform:uppercase;}
.dr-action{font-weight:700;min-width:90px;}
.decision-row.good{border-left:3px solid var(--green);}
.decision-row.ok{border-left:3px solid var(--gold);}
.decision-row.bad{border-left:3px solid var(--red);}
.dr-action.good{color:var(--green);}.dr-action.ok{color:var(--gold);}.dr-action.bad{color:var(--red);}
.analysis-grade{text-align:center;padding:16px;border-radius:16px;margin-bottom:18px;background:var(--panel2);border:1px solid var(--border);}
.grade-letter{font-size:48px;font-weight:900;line-height:1;}
.grade-label{font-size:12px;color:var(--dim);margin-top:3px;}
.grade-S{color:#d4a820;}.grade-A{color:#22a46c;}.grade-B{color:#3d6cf0;}.grade-C{color:#d87020;}.grade-D{color:#e04848;}.grade-F{color:#9333ea;}
.close-analysis{width:100%;margin-top:14px;padding:12px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.close-analysis:hover{background:#2d58e0;}

/* ===== トースト ===== */
#toast-container{position:fixed;top:58px;right:14px;z-index:200;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:12px;animation:slideIn .2s ease;max-width:260px;box-shadow:var(--shadow);}
.toast.win{border-color:var(--green);color:var(--green);}.toast.info{border-color:var(--accent);color:var(--accent);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ===== 横画面（広いランドスケープ）対応 ===== */
@media(min-width:860px) and (orientation:landscape){
  #main-area{flex-direction:row;overflow:hidden;}
  #table-wrap{flex:1;padding:14px 14px 0;}
  #table-container{max-width:860px;aspect-ratio:1.9/1;}
  #human-area{padding:8px 20px 14px;}
  #side-panel{width:255px;border-left:1px solid var(--border);border-top:none;max-height:none;}
}

/* ===== 縦画面・スモール対応 ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;overflow-x:hidden!important;height:auto!important;}
  .screen{height:auto!important;min-height:100dvh;}
  .setup-card{padding:20px 16px;width:100%;max-width:100%;}
  .setup-card h1{font-size:18px;}
  #game-screen.active{display:flex;flex-direction:column;height:auto!important;min-height:100dvh;overflow-y:auto;}
  #hud{padding:6px 10px;height:44px;}
  #main-area{overflow:visible;flex:none;}
  #table-wrap{flex:none;padding:6px 6px 0;}
  #table-container{aspect-ratio:1.45/1;max-width:100%;}
  #human-area{padding:8px 10px 12px;width:100%;}
  #human-cards .card.big{width:44px;height:64px;font-size:16px;}
  .action-btn{padding:9px 11px;font-size:12px;min-width:62px;}
  .qbtn{padding:5px 9px;font-size:11px;}
  #raise-slider{width:80px;}
  #raise-amount{width:56px;font-size:12px;}
  #quick-btns{gap:4px;}#main-btns{gap:4px;}
  .seat{width:72px;}
  .seat-name{font-size:10px;}.seat-chips{font-size:11px;}.seat-bet{font-size:9px;}.seat-pos-badge{font-size:8px;}
  .card{width:20px;height:32px;font-size:8px;border-radius:3px;}
  .card.big{width:32px;height:48px;font-size:13px;}
  .card.big.back::after{width:24px;height:36px;}
  .c-card{width:34px;height:50px;font-size:14px;}
  #pot-display{font-size:11px;padding:3px 10px;}
  #stage-label{font-size:9px;}
  #community-cards{gap:3px;}
  #analysis-box{width:100%;max-width:100%;max-height:92dvh;border-radius:14px;padding:14px 12px;}
  #side-panel{max-height:110px;}
}
@media(max-width:380px){
  .seat{width:60px;}
  .seat-name{font-size:8px;}
  .card.big{width:28px;height:42px;font-size:12px;}
  .c-card{width:30px;height:44px;font-size:13px;}
  #human-cards .card.big{width:36px;height:54px;font-size:14px;}
  .action-btn{padding:8px 8px;font-size:11px;min-width:54px;}
  #raise-slider{width:70px;}
}

</style>
</head>
<body>

<div id="setup-screen" class="screen active">
  <div class="setup-card">
    <h1>♠ YOHE Hold'em</h1>
    <div class="sub">GTOトレーニング | チップ制ポーカー練習</div>
    <div class="form-row"><label>プレイヤー数</label>
      <select id="cfg-players">
        <option value="2">2人 (ヘッズアップ)</option><option value="3">3人</option>
        <option value="4">4人</option><option value="5">5人</option>
        <option value="6" selected>6人</option><option value="7">7人</option>
        <option value="8">8人</option><option value="9">9人</option>
      </select>
    </div>
    <div class="blind-row">
      <div class="form-row"><label>SB</label>
        <select id="cfg-sb"><option value="1">1</option><option value="2" selected>2</option><option value="5">5</option><option value="10">10</option></select>
      </div>
      <div class="form-row"><label>BB</label>
        <select id="cfg-bb"><option value="2">2</option><option value="5" selected>5</option><option value="10">10</option><option value="20">20</option></select>
      </div>
    </div>
    <div class="form-row"><label>スタック</label>
      <select id="cfg-stack"><option value="50">50 BB</option><option value="100" selected>100 BB</option><option value="200">200 BB</option></select>
    </div>
    <div class="form-row"><label>AI難易度</label>
      <select id="cfg-ai"><option value="easy">Loose</option><option value="medium" selected>Standard</option><option value="hard">Tough</option></select>
    </div>
    <button class="btn-primary" id="btn-start">ゲーム開始</button>
  </div>
</div>

<div id="game-screen" class="screen">
  <div id="hud">
    <div class="hud-title">♠ YOHE Hold'em</div>
    <div id="hud-info">Hand #1 | SB 2 / BB 5</div>
    <div class="hud-btns">
      <button class="hud-btn" data-tab="history">履歴</button>
      
      <button class="hud-btn" id="btn-quit">終了</button>
    </div>
  </div>
  <div id="main-area">
    <div id="table-wrap">
      <div id="table-container">
        <div id="table-felt"></div>
        <div id="center-area">
          <div id="pot-display">Pot: 0</div>
          <div id="community-cards"></div>
          <div id="stage-label">PRE-FLOP</div>
        </div>
        <div id="seats-container"></div>
      </div>
      <div id="human-area">
        <div id="human-cards-row">
          <div id="human-cards"></div>
          <div id="human-hand-name"></div>
        </div>
        <div id="action-area">
          <div id="to-call-label"></div>
          <div id="quick-btns"></div>
          <div id="main-btns">
            <button class="action-btn" id="btn-fold">フォールド</button>
            <button class="action-btn" id="btn-check">チェック</button>
            <button class="action-btn" id="btn-call">コール</button>
            <div class="raise-ctrl">
              <input type="range" id="raise-slider" min="0" max="100" value="50">
              <input type="text" id="raise-amount" value="0" readonly>
              <button class="action-btn" id="btn-raise">レイズ</button>
            </div>
            <button class="action-btn" id="btn-allin">オールイン</button>
          </div>
        </div>
      </div>
    </div>
    <div id="side-panel">
      <div id="side-tabs">
        <div class="side-tab active" data-tab="history">履歴</div>
      </div>
      <div id="side-content">
        <div id="tab-history"><p style="color:var(--dim);font-size:11px;">ハンドが終わると表示されます</p></div>
        <div id="tab-roster" class="hidden"></div>
        <div id="tab-tips" class="hidden"></div>
      </div>
    </div>
  </div>
</div>

<div id="analysis-modal">
  <div id="analysis-box">
    <h2 id="analysis-title">ハンドレビュー</h2>
    <div class="analysis-sub" id="analysis-sub"></div>
    <div id="analysis-content"></div>
    <button class="close-analysis" id="close-analysis">次のハンドへ</button>
  </div>
</div>
<div id="toast-container"></div>

'use strict';

// ---- CARD & DECK ----
class Card{
  constructor(r,s){this.rank=r;this.suit=s;this.value=RANK_VAL[r];}
  get sym(){return SUIT_SYM[this.suit];}
  get isRed(){return this.suit==='h'||this.suit==='d';}
  toString(){return this.rank+this.suit;}
}
class Deck{
  constructor(){this.reset();}
  reset(){this.cards=[];for(const s of SUITS)for(const r of RANKS)this.cards.push(new Card(r,s));this.shuffle();}
  shuffle(){for(let i=this.cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.cards[i],this.cards[j]]=[this.cards[j],this.cards[i]];}}
  deal(){return this.cards.pop();}
}

// ---- HAND EVALUATOR ----
const HandEval={
  evaluate(cards){const combos=this._combos(cards,5);let best=null;for(const c of combos){const r=this._eval5(c);if(!best||r.score>best.score)best=r;}return best;},
  _combos(arr,k){if(k===0)return[[]];if(arr.length<k)return[];const[h,...t]=arr;return[...this._combos(t,k-1).map(c=>[h,...c]),...this._combos(t,k)];},
  _eval5(cards){
    const s=[...cards].sort((a,b)=>b.value-a.value);
    const v=s.map(c=>c.value),su=s.map(c=>c.suit);
    const fl=su.every(x=>x===su[0]),st=this._st(v);
    const fr={};v.forEach(x=>fr[x]=(fr[x]||0)+1);
    const co=Object.entries(fr).map(([x,c])=>({v:+x,c})).sort((a,b)=>b.c-a.c||b.v-a.v);
    let cat,score;
    if(fl&&st){cat=v[0]===14&&v[4]===10?9:8;score=cat*1e13+st.h*1e9;}
    else if(co[0].c===4){cat=7;score=7e13+co[0].v*1e9+co[1].v;}
    else if(co[0].c===3&&co[1].c===2){cat=6;score=6e13+co[0].v*1e9+co[1].v*1e5;}
    else if(fl){cat=5;score=5e13;v.forEach((x,i)=>score+=x*Math.pow(100,4-i));}
    else if(st){cat=4;score=4e13+st.h*1e9;}
    else if(co[0].c===3){cat=3;score=3e13+co[0].v*1e9;const k=co.slice(1).map(x=>x.v);score+=k[0]*1e5+k[1]*10;}
    else if(co[0].c===2&&co[1].c===2){cat=2;const hp=Math.max(co[0].v,co[1].v),lp=Math.min(co[0].v,co[1].v);score=2e13+hp*1e9+lp*1e5+co[2].v;}
    else if(co[0].c===2){cat=1;score=1e13+co[0].v*1e9;const k=co.slice(1).map(x=>x.v);score+=k[0]*1e5+k[1]*1e3+k[2];}
    else{cat=0;score=0;v.forEach((x,i)=>score+=x*Math.pow(100,4-i));}
    return{score,cat,name:HAND_NAMES[cat],bestFive:s,co};
  },
  _st(v){
    const u=[...new Set(v)];
    if(u[0]===14&&u.includes(2)&&u.includes(3)&&u.includes(4)&&u.includes(5))return{h:5};
    for(let i=0;i<=u.length-5;i++){if(u[i]-u[i+4]===4&&new Set(u.slice(i,i+5)).size===5)return{h:u[i]};}
    return false;
  }
};

// ---- EQUITY (Monte Carlo) ----
function estimateEquity(hc,board,nOpp,iter){
  iter=iter||300;let wins=0;
  const deck=new Deck();
  const known=new Set([...hc,...board].map(c=>c.toString()));
  deck.cards=deck.cards.filter(c=>!known.has(c.toString()));
  for(let i=0;i<iter;i++){
    deck.shuffle();const d=[...deck.cards];
    const b=[...board];while(b.length<5)b.push(d.pop());
    const my=HandEval.evaluate([...hc,...b]).score;
    let win=true;
    for(let o=0;o<nOpp;o++){
      if(!d[o*2]||!d[o*2+1])continue;
      if(HandEval.evaluate([d[o*2],d[o*2+1],...b]).score>my){win=false;break;}
    }
    if(win)wins++;
  }
  return wins/iter;
}

// コンボ数累積フラクション: ペア=6, スーテッド=4, オフスーツ=12 combos (計1326)
// handFrac=0.00 → 最強(AA付近), handFrac=1.00 → 最弱(72o)
const HAND_COMBO_FRAC={};

// 2枚のカードからハンド種別文字列を返す ('AKs','AKo','AA' など)
function handType(c1,c2){
  const RSTR='23456789TJQKA';
  const i1=RSTR.indexOf(c1.rank),i2=RSTR.indexOf(c2.rank);
  const hi=i1>=i2?c1:c2,lo=i1>=i2?c2:c1;
  if(hi.rank===lo.rank) return hi.rank+hi.rank;
  return hi.rank+lo.rank+(c1.suit===c2.suit?'s':'o');
}
// ハンドランク(1-169)を返す
function handRank(c1,c2){return HAND_STRENGTH[handType(c1,c2)]||169;}
function handDesc(c1,c2){
  const h=c1.value>=c2.value?c1:c2,l=c1.value>=c2.value?c2:c1;
  if(c1.value===c2.value)return 'ポケット'+(RANK_JP[h.rank]||h.rank)+'('+h.rank+h.rank+')';
  const suf=c1.suit===c2.suit?'スーテッド':'オフスーツ';
  return h.rank+l.rank+(c1.suit===c2.suit?'s':'o')+'('+(RANK_JP[h.rank]||h.rank)+(RANK_JP[l.rank]||l.rank)+' '+suf+')';
}

// ---- ポジション別オープンレンジ (GTO基準, 6-max) ----
// 値は「全169手中の上位X%」= オープンする割合
const POS_RANGE={
  easy:  {UTG:0.28,'UTG+1':0.30,MP:0.33,LJ:0.36,HJ:0.40,CO:0.45,BTN:0.58,SB:0.45,BB:0},
  medium:{UTG:0.17,'UTG+1':0.19,MP:0.21,LJ:0.23,HJ:0.25,CO:0.27,BTN:0.38,SB:0.28,BB:0},
  hard:  {UTG:0.12,'UTG+1':0.14,MP:0.16,LJ:0.18,HJ:0.20,CO:0.22,BTN:0.30,SB:0.22,BB:0}
};
function posLabel(si,di,n){
  const rel=((si-di)%n+n)%n;
  if(n===2)return rel===0?'SB':'BB';
  if(rel===0)return'BTN';if(rel===1)return'SB';if(rel===2)return'BB';
  const pos=rel-3;
  // 人数ごとのポジション名テーブル（BTN/SB/BB除く）
  const tbl={
    1:['UTG'],
    2:['UTG','CO'],
    3:['UTG','MP','CO'],
    4:['UTG','UTG+1','HJ','CO'],
    5:['UTG','UTG+1','MP','HJ','CO'],
    6:['UTG','UTG+1','MP','LJ','HJ','CO']
  };
  const tot=n-3;
  const arr=tbl[tot]||tbl[6];
  return arr[Math.min(pos,arr.length-1)]||'MP';
}

// ---- AI DECISION ----
function aiDecide(player,game,baseLevel){
  const prof=player.profile||AI_PROFILES.takeshi;
  const {holeCards,chips,currentBet}=player;
  const toCall=Math.max(0,game.currentBet-currentBet);
  const pot=game.pot,comm=game.community;
  const nAct=game.players.filter(p=>p.active&&!p.folded).length;
  const multi=nAct>2;
  const n=()=>(Math.random()*2-1)*prof.noise;
  const bb=game.bigBlind;

  if(comm.length===0){
    const ht=handType(holeCards[0],holeCards[1]);
    const handFrac=HAND_COMBO_FRAC[ht]||0.99; // コンボ累積比 0=最強側, 1=最弱側
    const pos=posLabel(player.seatIndex,game.dealerIndex,game.players.length);
    const isRaisedPot=game.currentBet>game.bigBlind;

    // ポジション別GTO基準レンジ幅 (コンボ数ベースの上位X%)
    const posRanges=POS_RANGE[baseLevel]||POS_RANGE.medium;
    const baseOpenPct=posRanges[pos]||0.20;
    const midOpenPct=posRanges['HJ']||0.25;

    // posAwareブレンド: 低posAware=全ポジション同じ幅でプレー
    const effOpenPct=baseOpenPct*prof.posAware+midOpenPct*(1-prof.posAware);

    // プロファイル調整: openWidthMult > 1.0 = ルーズ, < 1.0 = タイト
    const adjOpenPct=Math.min(0.85, effOpenPct*prof.openWidthMult);

    // ノイズ: コンボフラクションに直接加算 (±noise*3%)
    const noiseAdj=(Math.random()*2-1)*prof.noise*0.03;
    const effOpenPctN=Math.max(0.01, adjOpenPct+noiseAdj);

    // ① BBオプション（誰もレイズしていない）
    if(pos==='BB'&&!isRaisedPot){
      // BBスクイーズ: 上位10%コンボで40%の確率でレイズ
      const squeezePct=Math.min(0.85, 0.10*prof.openWidthMult);
      if(handFrac<=squeezePct&&Math.random()<0.40){
        const amt=Math.round(Math.min(bb*(2.5+Math.random()*0.5)*prof.betSizeMult,chips));
        return{action:'raise',amount:Math.max(amt,bb*2)};
      }
      return{action:'check'};
    }

    // ② BB vs レイズ (MDF防御, コンボフラクションベース)
    if(pos==='BB'&&isRaisedPot){
      const mdf=pot/(pot+toCall);
      const eMDF=Math.min(0.85,mdf*prof.bbDefenseWidth);
      // handFrac<=defendPct のコンボで守る
      const defendPct=(1-eMDF)*Math.sqrt(prof.openWidthMult);
      const threeBetPct=0.06; // 上位6%コンボ=3bet候補
      if(handFrac<=defendPct){
        if(handFrac<=threeBetPct&&Math.random()<0.50&&!prof.callBias){
          return{action:'raise',amount:Math.round(Math.min(toCall*3*prof.betSizeMult,chips))};
        }
        if(toCall>=chips)return{action:'allin'};
        return{action:'call'};
      }
      return{action:'fold'};
    }

    // ③ オープンレイズ (誰もレイズしていない)
    if(!isRaisedPot){
      if(handFrac<=effOpenPctN){
        const mult=2.3+Math.random()*0.5;
        const amt=Math.round(Math.min(bb*mult*prof.betSizeMult,chips));
        return{action:'raise',amount:Math.max(amt,Math.round(bb*2.3))};
      }
      // SBのみ稀にリンプ (レンジのすぐ外側)
      if(pos==='SB'&&handFrac<=effOpenPctN*1.15&&Math.random()<0.18){
        if(toCall>=chips)return{action:'allin'};
        return{action:'call'};
      }
      return{action:'fold'};
    }

    // ④ コール/3ベット/フォールド (レイズ済みポット)
    // コールレンジ: オープンレンジの約1.4倍 (コンボフラクションベース)
    const callPct=Math.min(0.70, adjOpenPct*1.4);
    // 3betレンジ: 上位5-8%コンボのバリューハンド
    const threeBetPct=Math.min(0.08, adjOpenPct*0.35);
    const po=toCall/(pot+toCall);

    if(handFrac<=callPct+noiseAdj){
      if(handFrac<=threeBetPct&&Math.random()<0.45&&!prof.callBias){
        const siz=Math.round(Math.min(toCall*(2.8+Math.random()*0.6)*prof.betSizeMult,chips));
        return{action:'raise',amount:siz};
      }
      // 簡易エクイティ計算: フラクション小ほど高エクイティ
      const eq=Math.max(0.12, 0.85-handFrac*0.75)+n()*0.04;
      if(eq>po-0.03){
        if(toCall>=chips)return{action:'allin'};
        return{action:'call'};
      }
    }
    if(toCall>=chips)return{action:'allin'};
    return{action:'fold'};
  }

  // Postflop
  const ev=HandEval.evaluate([...holeCards,...comm]);
  let str=[0.05,0.22,0.48,0.62,0.73,0.81,0.88,0.95,0.98,1.0][ev.cat];
  const eq=estimateEquity(holeCards,comm,Math.max(1,nAct-1),250);
  str=str*0.38+eq*0.62+n()*0.04;
  const po=toCall>0?toCall/(pot+toCall):0;
  let bFreq=prof.bluffFreq;
  if(multi&&!prof.ignoreMultiway)bFreq*=0.25;
  const cantFold=prof.cantFoldMadeHand&&ev.cat>=1&&str>0.28;

  if(toCall===0){
    const myPos=posLabel(player.seatIndex,game.dealerIndex,game.players.length);
    // OOP判定: SB/BBはポストフロップで先行動 → ドンクベット状況
    // UTG等のマルチウェイOOPも含めるが、主要なケースはSB/BB
    const isOOP=['BB','SB','UTG','UTG+1'].includes(myPos)&&nAct<=4;

    if(isOOP){
      // ---- OOPドンクベット: GTOでは原則禁止 ----
      // 理由: レンジ不利・Cベット権利の放棄・相手にフリーカード献上
      // 許可条件A: ツーペア以上(cat>=2) — バリュー・プロテクション目的
      // 許可条件B: フィッシュ系(donkFreq高)の場合はワンペア強手も含む
      const donkValueOK=(ev.cat>=2&&str>0.55)||(ev.cat>=3&&str>0.45);
      const donkFishOK=prof.donkFreq>=0.15&&ev.cat>=1&&str>0.70; // フィッシュのみ強いワンペアでも
      if((donkValueOK||donkFishOK)&&Math.random()<prof.donkFreq){
        // サイズは小さめ (33-50%ポット): 大きいドンクは読まれやすい
        const f=(0.33+Math.random()*0.17)*prof.betSizeMult;
        const amt=Math.round(Math.min(pot*f,chips));
        if(amt>0)return{action:'raise',amount:amt};
      }
      // ピュアブラフドンク: エア×ブロッカー狙い、非常に稀
      if(ev.cat===0&&str<0.12&&Math.random()<prof.donkFreq*prof.bluffFreq*0.35){
        const amt=Math.round(Math.min(pot*0.38*prof.betSizeMult,chips));
        if(amt>0)return{action:'raise',amount:amt};
      }
      // OOP: それ以外は全てチェック → 相手のCベットを待つ
      return{action:'check'};
    }

    // ---- IP / PFR: 通常のCベット・バリューベット・ブラフ ----
    if(str>0.62){
      const f=(0.48+Math.random()*0.35)*prof.betSizeMult;
      return{action:'raise',amount:Math.round(Math.min(pot*f,chips))};
    }
    if(str>0.42&&Math.random()<0.32){
      const f=(0.32+Math.random()*0.2)*prof.betSizeMult;
      return{action:'raise',amount:Math.round(Math.min(pot*f,chips))};
    }
    if(Math.random()<bFreq){
      return{action:'raise',amount:Math.round(Math.min(pot*(0.45+Math.random()*0.2)*prof.betSizeMult,chips))};
    }
    return{action:'check'};
  } else {
    const ft=prof.foldToBetBase+n()*0.07;
    if(str>po+0.10||cantFold){
      if(str>0.72&&Math.random()<0.28){
        const amt=Math.round(Math.min(toCall*(1.8+Math.random())*prof.betSizeMult,chips));
        return{action:'raise',amount:amt};
      }
      if(toCall>=chips)return{action:'allin'};
      return{action:'call'};
    }
    if(toCall>=chips)return{action:'allin'};
    if(Math.random()<bFreq*0.4){
      const amt=Math.round(Math.min(pot*0.55*prof.betSizeMult,chips));
      if(amt>0)return{action:'raise',amount:amt};
    }
    if(str>po*(1-ft*0.3)&&Math.random()>ft){
      if(toCall>=chips)return{action:'allin'};
      return{action:'call'};
    }
    return{action:'fold'};
  }
}

// ---- GAME ENGINE ----
class Player{
  constructor(id,name,chips,isHuman,si){
    this.id=id;this.name=name;this.chips=chips;this.isHuman=!!isHuman;this.seatIndex=si||0;
    this.profile=null;this.holeCards=[];this.currentBet=0;
    this.folded=false;this.active=true;this.allIn=false;this.totalInvested=0;
  }
  reset(){this.holeCards=[];this.currentBet=0;this.folded=false;this.allIn=false;this.totalInvested=0;}
}
class GameEngine{
  constructor(cfg){
    this.sb=cfg.sb;this.bb=cfg.bb;this.aiLevel=cfg.aiLevel;this.startingChips=cfg.startingChips;
    this.handNum=0;this.handHistory=[];
    this.players=[new Player(0,'あなた',cfg.startingChips,true,0)];
    const pool=[...PROFILE_KEYS].sort(()=>Math.random()-0.5);
    for(let i=1;i<cfg.numPlayers;i++){
      const key=pool[(i-1)%pool.length];
      const p=new Player(i,AI_PROFILES[key].displayName,cfg.startingChips,false,i);
      p.profile=AI_PROFILES[key];
      this.players.push(p);
    }
    this.dealerIndex=0;this.community=[];this.pot=0;this.currentBet=0;
    this.street='preflop';this.deck=new Deck();this.minRaise=cfg.bb;
    this.actorsRemaining=[];this.currentHandDecisions=[];
    this.waitingForHuman=false;this.gameOver=false;
    this.sbIdx=0;this.bbIdx=1;this._lastWinners=[];
  }
  get smallBlind(){return this.sb;}
  get bigBlind(){return this.bb;}
  activePlayers(){return this.players.filter(p=>p.active);}
  nonFolded(){return this.activePlayers().filter(p=>!p.folded);}
  startHand(){
    // リングゲーム：チップ切れはリバイ（開始スタックに戻す）
    this.players.forEach(p=>{
      if(p.chips<=0&&p.active){p.chips=this.startingChips;p._rebought=true;}
    });
    if(this.activePlayers().length<2){this.gameOver=true;return;}
    this.handNum++;this.deck.reset();this.community=[];
    this.pot=0;this.currentBet=0;this.street='preflop';this.minRaise=this.bb;
    this.actorsRemaining=[];this.currentHandDecisions=[];
    this.players.forEach(p=>p.reset());
    do{this.dealerIndex=(this.dealerIndex+1)%this.players.length;}
    while(!this.players[this.dealerIndex].active);
    for(const p of this.activePlayers())p.holeCards=[this.deck.deal(),this.deck.deal()];
    this._postBlinds();this._setOrder();
  }
  _ns(from){
    let i=(from+1)%this.players.length,t=0;
    while(t++<this.players.length){if(this.players[i].active&&!this.players[i].folded)return i;i=(i+1)%this.players.length;}
    return from;
  }
  _fb(p,amt){const a=Math.min(amt,p.chips);p.chips-=a;p.currentBet+=a;p.totalInvested+=a;this.pot+=a;if(p.chips===0)p.allIn=true;}
  _postBlinds(){
    const n=this.activePlayers().length;
    if(n===2){this.sbIdx=this.dealerIndex;this.bbIdx=this._ns(this.sbIdx);}
    else{this.sbIdx=this._ns(this.dealerIndex);this.bbIdx=this._ns(this.sbIdx);}
    this._fb(this.players[this.sbIdx],this.sb);
    this._fb(this.players[this.bbIdx],this.bb);
    this.currentBet=this.bb;this.minRaise=this.bb;
  }
  _buildActors(from){
    const arr=[];let idx=from;
    for(let i=0;i<this.players.length;i++){
      const p=this.players[idx];
      if(p.active&&!p.folded&&!p.allIn)arr.push(idx);
      idx=(idx+1)%this.players.length;
    }
    return arr;
  }
  _setOrder(){
    if(this.street==='preflop'){
      const s=this._ns(this.bbIdx);
      this.actorsRemaining=this._buildActors(s).filter(i=>i!==this.bbIdx);
      const bb=this.players[this.bbIdx];
      if(bb.active&&!bb.folded&&!bb.allIn)this.actorsRemaining.push(this.bbIdx);
    } else {
      this.actorsRemaining=this._buildActors(this._ns(this.dealerIndex));
    }
    this.actionIdx=this.actorsRemaining[0]??-1;
  }
  processAction(pi,action,raiseAmt){
    const p=this.players[pi];
    const toCall=Math.max(0,this.currentBet-p.currentBet);
    const prevBet=this.currentBet;
    const prevMinRaise=this.minRaise;
    const dec={street:this.street,action,amount:0,potOdds:toCall>0?toCall/(this.pot+toCall):0,position:posLabel(pi,this.dealerIndex,this.activePlayers().length),pot:this.pot,toCall:toCall,facingRaise:this.currentBet>this.bb,playerName:p.name,isHuman:p.isHuman,playerIdx:pi};
    if(action==='fold'){p.folded=true;}
    else if(action==='check'){}
    else if(action==='call'){
      const a=Math.min(toCall,p.chips);
      p.chips-=a;p.currentBet+=a;p.totalInvested+=a;this.pot+=a;
      dec.amount=a;if(p.chips===0)p.allIn=true;
    } else {
      // allin: 持ちチップのみ（minRaiseで引き上げない）
      // raise: 通常のminRaise強制
      const rt=action==='allin'
        ?p.chips+p.currentBet
        :Math.max(Math.min(raiseAmt,p.chips+p.currentBet),this.currentBet+this.minRaise);
      const a=Math.min(rt-p.currentBet,p.chips);
      p.chips-=a;p.currentBet+=a;p.totalInvested+=a;this.pot+=a;
      // currentBetはrtが現在値を超える場合のみ更新（パーシャルオールインは更新しない）
      if(rt>this.currentBet){
        const raiseSize=rt-this.currentBet;
        if(raiseSize>=this.minRaise)this.minRaise=raiseSize;
        this.currentBet=rt;
      }
      dec.amount=a;if(p.chips===0)p.allIn=true;
    }
    this.currentHandDecisions.push(dec);
    this.actorsRemaining=this.actorsRemaining.filter(i=>i!==pi);
    // フルレイズのみアクション再開放。パーシャルオールインは再開放しない
    if((action==='raise'||action==='allin')&&this.currentBet>prevBet){
      if(this.currentBet-prevBet>=prevMinRaise){
        this.actorsRemaining=this._buildActors((pi+1)%this.players.length).filter(i=>i!==pi);
      }
    }
    this.actionIdx=this.actorsRemaining[0]??-1;
    this._check();
    return dec;
  }
  _check(){
    if(this.nonFolded().length<=1){this._end();return;}
    if(this.actorsRemaining.length===0){this._next();return;}
  }
  _next(){
    this.players.forEach(p=>p.currentBet=0);
    this.currentBet=0;this.minRaise=this.bb;
    const streets=['preflop','flop','turn','river','showdown'];
    this.street=streets[streets.indexOf(this.street)+1]||'showdown';
    if(this.street==='flop')this.community=[this.deck.deal(),this.deck.deal(),this.deck.deal()];
    else if(this.street==='turn'||this.street==='river')this.community.push(this.deck.deal());
    else if(this.street==='showdown'){while(this.community.length<5)this.community.push(this.deck.deal());this._end();return;}
    this._setOrder();
    // オールインランアウト：アクター不在なら自動で次ストリートへ
    if(this.actorsRemaining.length===0&&this.street!=='showdown')this._next();
  }
  _end(){
    const nf=this.nonFolded();
    let winners;
    if(nf.length===1){winners=[{player:nf[0],playerIdx:this.players.indexOf(nf[0]),amount:this.pot,byFold:true}];}
    else{
      const res=nf.map(p=>({player:p,ev:HandEval.evaluate([...p.holeCards,...this.community])}));
      res.sort((a,b)=>b.ev.score-a.ev.score);
      const top=res[0].ev.score;
      const ws=res.filter(r=>r.ev.score===top);
      const share=Math.floor(this.pot/ws.length);
      winners=ws.map(w=>({player:w.player,playerIdx:this.players.indexOf(w.player),amount:share,eval:w.ev,byFold:false}));
    }
    for(const w of winners)w.player.chips+=w.amount;
    this.handHistory.unshift({
      handNum:this.handNum,winners,community:[...this.community],
      players:this.players.map(p=>({
        name:p.name,isHuman:p.isHuman,holeCards:[...p.holeCards],
        folded:p.folded,chips:p.chips,totalInvested:p.totalInvested,profile:p.profile,
        handResult:p.holeCards.length&&this.community.length?HandEval.evaluate([...p.holeCards,...this.community]):null
      })),
      decisions:[...this.currentHandDecisions],pot:this.pot,street:this.street,
      dealerIndex:this.dealerIndex,bigBlind:this.bb,
      numActive:this.nonFolded().length+this.players.filter(p=>p.active&&p.folded).length
    });
    this.street='showdown';
  }
  isHumanTurn(){return this.street!=='showdown'&&this.actionIdx>=0&&!!this.players[this.actionIdx]?.isHuman;}
  getToCall(){const h=this.players.find(p=>p.isHuman);return Math.max(0,this.currentBet-h.currentBet);}
}

function selectLesson(decisions,hr){
  const tags=new Set();
  if((hr.numActive||0)>2)tags.add('multiway');
  for(const d of decisions){
    if(d.potOdds>0)tags.add('potodds'),tags.add('equity');
    if(d.action==='fold'&&d.street==='preflop')tags.add('preflop'),tags.add('fold');
    if(d.action==='fold')tags.add('fold');
    if(d.action==='call')tags.add('call'),tags.add('potodds');
    if(d.action==='raise'&&d.street==='preflop')tags.add('preflop'),tags.add('3bet');
    if(d.action==='raise'&&d.street!=='preflop')tags.add('value'),tags.add('sizing');
    if(d.action==='allin')tags.add('allin'),tags.add('spr');
    if(d.street==='flop')tags.add('flop'),tags.add('cbet');
  }
  const pool=GTO_TIPS.filter(t=>t.tags.some(tg=>tags.has(tg)));
  return (pool.length?pool:GTO_TIPS)[Math.floor(Math.random()*(pool.length||GTO_TIPS.length))];
}

// ---- ANALYSIS ----
// ===== GTO採点エンジン v4 - EV損失ベース =====

// ストリート重み: プリフロップは全ストリートに波及、リバーはEV確定
const STREET_W={preflop:1.4,flop:1.0,turn:1.2,river:1.5};

// ボードテクスチャ分析
function boardTex(comm){
  if(!comm||comm.length===0)return{paired:false,tripped:false,flushy:0,monotone:false,straightDraw:false,flushDraw:false,dynamic:false,highboard:false,lowboard:false};
  const rv=comm.map(c=>RANK_VAL[c.rank]||0);
  const rc={};comm.forEach(c=>rc[c.rank]=(rc[c.rank]||0)+1);
  const sc={};comm.forEach(c=>sc[c.suit]=(sc[c.suit]||0)+1);
  const maxSuit=Math.max(...Object.values(sc));
  const paired=Object.values(rc).some(v=>v>=2);
  const tripped=Object.values(rc).some(v=>v>=3);
  const uniq=[...new Set(rv)].sort((a,b)=>a-b);
  let straightDraw=false;
  if(uniq.length>=2){
    for(let i=0;i<=uniq.length-2;i++){if(uniq[i+1]-uniq[i]<=2)straightDraw=true;}
    if(uniq.length>=3){for(let i=0;i<=uniq.length-3;i++){if(uniq[i+2]-uniq[i]<=4)straightDraw=true;}}
  }
  if(uniq.includes(14)&&uniq.includes(2))straightDraw=true;
  const flushDraw=maxSuit>=3;
  const dynamic=flushDraw||straightDraw;
  const avgRank=rv.reduce((a,b)=>a+b,0)/rv.length;
  return{paired,tripped,flushy:maxSuit,monotone:maxSuit>=comm.length&&comm.length>=3,straightDraw,flushDraw,dynamic,highboard:avgRank>=10,lowboard:avgRank<=6};
}

// プレイヤー固有のドロー検出
function playerDraw(holeCards,comm){
  if(!holeCards||holeCards.length<2||comm.length<3)return{flush:false,straight:false,oesd:false,gutshot:false,outs:0};
  // フラッシュドロー: ホールカードが含む4枚フラッシュ（完成していない）
  const all=[...holeCards,...comm];
  const sc={};all.forEach(c=>sc[c.suit]=(sc[c.suit]||0)+1);
  let flushDraw=false;
  for(const hc of holeCards){
    if((sc[hc.suit]||0)===4&&comm.filter(c=>c.suit===hc.suit).length>=2)flushDraw=true;
  }
  // ストレートドロー: OESD(8アウト)/ガットショット(4アウト)
  const vals=[...new Set(all.map(c=>RANK_VAL[c.rank]))].sort((a,b)=>a-b);
  if(vals.includes(14))vals.unshift(1); // Ace-low wheel draw - must prepend, not append
  const holeVals=new Set(holeCards.map(c=>RANK_VAL[c.rank]));
  let oesd=false,gutshot=false;
  for(let i=0;i<vals.length-3;i++){
    const w=vals.slice(i,i+4);
    if(w[3]-w[0]<=4&&new Set(w).size===4){
      if(![...w].some(v=>holeVals.has(v)))continue;
      if(w[3]-w[0]===3)oesd=true;
      else gutshot=true;
    }
  }
  const outs=Math.min(15,(flushDraw?9:0)+(oesd?8:gutshot?4:0));
  return{flush:flushDraw,straight:oesd||gutshot,oesd,gutshot,outs};
}

// ハンド役割分析（レンジ内相対強度ベース）
function handRole(holeCards,comm,evalResult){
  if(!evalResult||!holeCards||holeCards.length<2)return{role:'unknown',note:'',isNut:false,isVuln:false};
  const cat=evalResult.cat;
  const tex=boardTex(comm);
  const r1=RANK_VAL[holeCards[0].rank]||0,r2=RANK_VAL[holeCards[1].rank]||0;
  const hi=Math.max(r1,r2),lo=Math.min(r1,r2);
  const boardRanks=comm.map(c=>RANK_VAL[c.rank]||0).sort((a,b)=>b-a);

  if(cat===0){
    // リバー（comm.length>=5）ではドローは決着済み → cat=0はドロー失敗（air）
    if(comm.length>=5){
      return{role:'air',note:'ハイカード（ドロー失敗）。ショーダウンバリューなし。ブラフかチェックが基本。',isNut:false,isVuln:false};
    }
    const draw=playerDraw(holeCards,comm);
    if(draw.flush&&draw.straight)return{role:'draw',note:'コンボドロー（フラッシュ＋ストレート、約'+draw.outs+'アウト）。非常に強いセミブラフ。積極的にベット推奨。',isNut:false,isVuln:false,draw};
    if(draw.flush)return{role:'draw',note:'フラッシュドロー（9アウト）。セミブラフとしてベットが有効。ヒット率約35%。',isNut:false,isVuln:false,draw};
    if(draw.oesd)return{role:'draw',note:'OESD（8アウト）。強いセミブラフ。ベットで2つの勝ち筋。',isNut:false,isVuln:false,draw};
    if(draw.gutshot)return{role:'draw',note:'ガットショット（4アウト）。弱めのドロー。追加エクイティ次第でセミブラフ。',isNut:false,isVuln:false,draw};
    return{role:'air',note:'ハイカード。ショーダウンバリューが薄く、ブラフかフォールドが基本。',isNut:false,isVuln:false};
  }

  if(cat===1){// ワンペア
    const pairRank=holeCards.find(c=>comm.some(b=>b.rank===c.rank))?.rank;
    const pairVal=pairRank?RANK_VAL[pairRank]:0;
    // ボードペア判定: ホールカードがペアに貢献していない（ボードのペアを使用中）
    if(!pairRank){
      const boardHasPair=Object.values(Object.fromEntries(comm.map(c=>[c.rank,comm.filter(b=>b.rank===c.rank).length]))).some(v=>v>=2);
      if(boardHasPair){
        const kick=Math.max(r1,r2);
        const isAhigh=kick>=14,isKhigh=kick>=13;
        const kickRole=isAhigh?'strong':'air';
        const kickNote=isAhigh?'A-high。ショーダウン価値あり。ブラフキャッチ・SDV役割が主。':
                      isKhigh?'K-high。ショーダウン価値は限定的。':
                      'ハイカード。ショーダウン価値なし。';
        return{role:kickRole,note:'ボードペア（ホールカードはキッカーのみ）。'+kickNote+'バリューベットは難しく、ポットコントロールまたはブラフキャッチが基本。',isNut:false,isVuln:true};
      }
    }
    const isTop=pairVal===boardRanks[0];
    const isOver=hi>boardRanks[0]&&r1===r2; // pocket over pair
    const kick=isTop?(hi===pairVal?lo:hi):0;
    const vuln=tex.flushDraw||tex.straightDraw;
    let note='';
    if(isOver)note='オーバーペア。強いバリューハンド。積極的にベット推奨。';
    else if(isTop&&kick>=12)note='トップペア強キッカー（'+(RANK_JP[holeCards.find(c=>RANK_VAL[c.rank]!==pairVal)?.rank]||'')+'）。バリューベット優先。';
    else if(isTop&&kick>=10)note='トップペア中キッカー。バリューベット可。中サイズ推奨。';
    else if(isTop)note='トップペア弱キッカー。中サイズのバリューを取りながらポットコントロールを意識。レンジ内では中位ハンド。';
    else note='中・低ペア。レンジ内では弱め。主にcheck-call戦略。';
    if(vuln&&isTop)note+=(tex.flushDraw?' フラッシュドロー注意。':'')+( tex.straightDraw?' ストレートドロー注意。':'');
    const role=isOver?'strong':(isTop&&kick>=12?'strong':isTop&&kick>=10?'value':'medium');
    return{role,note,isNut:false,isVuln:vuln};
  }

  if(cat===2){// ツーペア
    const myRanks=[r1,r2];
    const isTopTwo=myRanks.every(r=>boardRanks.slice(0,2).includes(r))||
                   myRanks.some(r=>boardRanks[0]===r)&&myRanks.some(r=>boardRanks[1]===r);
    const vuln=tex.paired; // ボードペアでカウンターフィットリスク
    const note='ツーペア'+(vuln?' ボードペアでカウンターフィット（格下げ）リスクあり。check-call中心に。':' 強いバリューハンド。積極的にベット推奨。');
    return{role:isTopTwo?'strong':'value',note,isNut:false,isVuln:vuln};
  }

  if(cat===3){// トリップス
    const tripRank=Object.entries(Object.fromEntries(comm.map(c=>[c.rank,(comm.filter(b=>b.rank===c.rank).length)]))).find(([_,v])=>v>=2)?.[0];
    const myTripKick=holeCards.find(c=>c.rank!==tripRank);
    const kick=myTripKick?RANK_VAL[myTripKick.rank]:0;
    const boardTripKick=boardRanks.find(r=>r!==RANK_VAL[tripRank]);
    const kickVuln=kick<(boardTripKick||10);
    const note='トリップス'+(kickVuln?kick+'キッカー。同じトリップスでA〜'+['','','','','','','','','8','9','T','J','Q','K','A'][boardTripKick||10]+'キッカーを持つ相手に負けます。check-callベースで、大きなバリューは慎重に。':' 強いトリップス。積極的にバリューを取りましょう。');
    return{role:kickVuln?'value':'strong',note,isNut:!kickVuln,isVuln:kickVuln};
  }

  if(cat===4)return{role:'strong',note:'ストレート。フラッシュ・フルハウスに注意しながらバリューを取りましょう。',isNut:false,isVuln:tex.flushy>=3};
  if(cat===5){
    const isNutFlush=hi===14&&holeCards.some(c=>RANK_VAL[c.rank]===14&&comm.some(b=>b.suit===c.suit));
    return{role:isNutFlush?'nutted':'strong',note:'フラッシュ'+(isNutFlush?' (ナッツ)。積極的にバリューを取りましょう。':'（弱め）。大きなレイズには慎重に。'),isNut:isNutFlush,isVuln:tex.paired};
  }
  if(cat===6)return{role:'nutted',note:'フルハウス。超強力。積極的にバリューを取りましょう。',isNut:true,isVuln:false};
  if(cat>=7)return{role:'nutted',note:cat===7?'フォーカード。ナッツ。バリューを最大化しましょう。':'ストレートフラッシュ/ロイヤル。最高ハンド。',isNut:true,isVuln:false};
  return{role:'unknown',note:'',isNut:false,isVuln:false};
}

// 相手の連続ベットによるレンジ補正（エクイティ割引）
function oppRangeAdj(hr,targetStreet){
  const streetOrder=['preflop','flop','turn','river'];
  const si=streetOrder.indexOf(targetStreet);
  if(si<=0)return 1.0;
  let betCount=0;
  for(let i=1;i<si;i++){
    const st=streetOrder[i];
    const calls=hr.decisions.filter(d=>d.street===st&&d.isHuman&&d.action==='call'&&d.toCall>0);
    if(calls.length>0)betCount++;
  }
  return[1.0,0.92,0.86,0.82][Math.min(betCount,3)];
}

function calcSPR(humanChips,pot){return pot>0?Math.round(humanChips/pot*10)/10:99;}

// ===== ソルバー頻度推定 v2 =====
// P(solver bets) given equity, street, role, texture
// inPosCheck: ヴィランチェック後のIPベット（レンジcapped補正）
// isIP: インポジション（BTN/CO）かどうか
function solverBetProb(eq,street,role,tex,isHU,inPosCheck,isIP){
  isIP=isIP||false;
  const isRiver=street==='river';
  const isTurn=street==='turn';

  // IP補正: IPはOOPより約15%多くbet、OOP×マルチウェイは若干少なく
  const ipAdj=isIP?1.15:(isHU?1.0:0.90);

  // ナッツ/超強ハンド: IPはbet多め、OOPはtrap(check-raise)多め
  if(role.isNut||role.role==='nutted'){
    return isIP?0.72:0.60;
  }

  // リバー極性補正: EQ依存型（薄バリューほど強く補正、強バリューはほぼ無し）
  const polarMult=inPosCheck?0.28:1.0;
  const riverPolar=isRiver?Math.max(0,0.22-eq*0.22)*polarMult:0;
  const turnPolar=isTurn?0.06*polarMult:0;
  const polarFactor=riverPolar+turnPolar;

  // ドローハンド: セミブラフとして評価
  if(role.role==='draw'){
    const draw=role.draw||{};
    const ipD=isIP?1.12:1.0;
    if(draw.flush&&draw.straight)return Math.min(0.84,Math.max(0.45,(0.52+(eq-0.50)*0.9)*ipD));
    if(draw.flush||draw.oesd)return Math.min(0.72,Math.max(0.28,(0.38+(eq-0.35)*0.6)*ipD));
    // ガットショット
    return Math.min(0.42,Math.max(0.14,(0.20+(eq-0.28)*0.5)*ipD));
  }

  if(role.role==='strong'){
    const base=(eq-0.44)*2.2*ipAdj;
    return Math.max(0.18,Math.min(0.90,base-polarFactor));
  }
  if(role.role==='value'){
    const eqBase=inPosCheck?0.47:0.51;
    const mult=(inPosCheck?2.1:1.9)*ipAdj;
    const base=(eq-eqBase)*mult;
    return Math.max(0.08,Math.min(0.76,base-polarFactor));
  }
  if(role.role==='medium'){
    const base=(eq-0.57)*1.6*ipAdj;
    return Math.max(0.05,Math.min(0.56,base-polarFactor*1.4));
  }
  if(role.role==='air'){
    const bluffBase=tex.dynamic?0.28:0.16;
    const base=isHU?bluffBase*1.25:bluffBase;
    return Math.min(0.40,base*(isIP?1.20:1.0));
  }
  return Math.max(0.10,Math.min(0.82,(eq-0.50)*2.1*ipAdj-polarFactor));
}

// ソルバー頻度 → EV損失 → 減点 変換
// freq: P(solver takes the action that was taken)
function freqToDeduction(freq,street){
  const sw=STREET_W[street]||1.0;
  // freq >= 0.62: ほぼ正解 (S/Aレンジ)
  // freq 0.38-0.62: ミックス戦略 (Sレンジ、減点なし)
  // freq < 0.38: EV損失あり (A~F)
  if(freq>=0.75) return{quality:'good',deduction:0,isMix:false,freqPct:Math.round(freq*100)};
  if(freq>=0.62) return{quality:'good',deduction:Math.round(2*sw),isMix:false,freqPct:Math.round(freq*100)};
  if(freq>=0.45) return{quality:'ok',deduction:0,isMix:true,freqPct:Math.round(freq*100)};  // true mix
  if(freq>=0.32) return{quality:'ok',deduction:Math.round(8*sw),isMix:false,freqPct:Math.round(freq*100)};
  if(freq>=0.18) return{quality:'bad',deduction:Math.round(18*sw),isMix:false,freqPct:Math.round(freq*100)};
  return{quality:'bad',deduction:Math.round(30*sw),isMix:false,freqPct:Math.round(freq*100)};
}

function suggestBet(pot,eq,street){
  let pct;
  if(street==='river'){pct=eq>0.92?100:eq>0.80?75:eq>0.68?60:45;}
  else if(street==='turn'){pct=eq>0.75?75:eq>0.62?65:50;}
  else{pct=eq>0.70?65:eq>0.56?50:33;}
  return{pct,amt:Math.round(pot*pct/100)};
}

// ===== ポストフロップ評価 (EV損失ベース) =====

function evalCheck(d,hr,human,nOpponents){
  const hc=human.holeCards;
  if(!hc||hc.length<2)return{quality:'ok',deduction:0,comment:'チェック。'};
  const commLen={flop:3,turn:4,river:5}[d.street]||3;
  const comm=hr.community.slice(0,commLen);
  const eq=estimateEquity(hc,comm,nOpponents,400)*oppRangeAdj(hr,d.street);
  const pot=d.pot||0;
  const tex=boardTex(comm);
  const evalRes=hc.length&&comm.length>=3?HandEval.evaluate([...hc,...comm]):null;
  const role=evalRes?handRole(hc,comm,evalRes):{role:'unknown',note:'',isNut:false,isVuln:false};
  const isRiver=d.street==='river';
  const isTurn=d.street==='turn';
  const isHU=nOpponents===1;
  const eqPct=Math.round(eq*100);

  // IP check-back detection: ヴィランが先にチェックし、ヒューマンがcheck-backした場合
  const myDecIdxCk=hr.decisions.findIndex(d2=>d2===d);
  const villainCkBefore=myDecIdxCk>0&&hr.decisions.slice(0,myDecIdxCk).some(
    d2=>d2.street===d.street&&!d2.isHuman&&d2.action==='check'
  );
  // IP判定: BTN/CO or HU(SB)
  const isIPck=d.position==='BTN'||d.position==='CO';
  // ソルバーがベットする確率 → チェックの頻度 = 1 - betProb
  const betProb=solverBetProb(eq,d.street,role,tex,isHU,villainCkBefore,isIPck);
  const checkProb=1-betProb;
  let sc=freqToDeduction(checkProb,d.street);
  const isNutLike=role.isNut||role.role==='nutted';
  const isStrongHand=isNutLike||role.role==='strong';

  // ナッツ・強ハンドのチェック: slowplay/trap/レンジ保護として有効 → 減点緩和
  if(sc.quality!=='good'&&sc.deduction>0&&isNutLike){
    sc={...sc,deduction:Math.min(sc.deduction,5),isMix:sc.deduction<=8};
  }else if(sc.quality==='bad'&&sc.deduction>0&&isStrongHand&&!isNutLike){
    // ストレート/フラッシュ等の強ハンドtrap-check: ナッツ未満でも減点上限を設ける
    const sw6=STREET_W[d.street]||1.0;
    sc={...sc,deduction:Math.min(sc.deduction,Math.round(18*sw6))};
  }else if(sc.quality==='ok'&&sc.deduction>0&&isStrongHand){
    sc={...sc,deduction:Math.round(sc.deduction*0.6)};
  }

  // マルチウェイ補正: 3way以上はCB頻度が大幅低下
  const isMultiway=nOpponents>=2;
  const mwNote=isMultiway?' マルチウェイ（'+( nOpponents+1)+'way）ではCB頻度が大幅低下。レンジ全体で頻度を絞るのが自然。':'';

  let comment='チェック（EQ約'+eqPct+'%）。'+role.note;
  if(sc.isMix){
    comment+=' GTOソルバーではbet/checkの混合戦略（推定bet率約'+Math.round(betProb*100)+'% / check率約'+Math.round(checkProb*100)+'%）。どちらも許容範囲です。'+mwNote;
    if(isHU&&!isMultiway)comment+=' HUでは薄バリューベットも有効。';
    if(isNutLike)comment+=' 強ハンドのチェックはtrap/レンジ保護として有効。';
  }else if(sc.quality==='good'){
    comment+=' チェックが推奨される局面です（推定check率約'+Math.round(checkProb*100)+'%）。'+mwNote;
    if(isNutLike&&sc.deduction===0)comment+=' 強ハンドのslowplay/checkは戦略的に有効。';
  }else if(sc.quality==='ok'){
    const suggest=suggestBet(pot,eq,d.street);
    if(isNutLike){
      comment+=' slowplay/trap戦略として自然。ベットも有力（推定bet率約'+Math.round(betProb*100)+'%）。'+mwNote;
    }else{
      comment+=' ベットも有力な選択肢（推定bet率約'+Math.round(betProb*100)+'%）。'+mwNote;
    }
    return{...sc,comment,suggest:pot>0?'ベット案: ポットの'+suggest.pct+'% ('+suggest.amt+'T)':''};
  }else{
    if(isStrongHand){
      comment+=' ベットが有力（推定bet率約'+Math.round(betProb*100)+'%）。ただし'+mwNote+'チェックにも戦略的価値あり（slowplay/trap）。';
    }else{
      comment+=' 【EV損失】この局面でのチェックは期待値損失が大きいです（推定bet率約'+Math.round(betProb*100)+'%）。'+mwNote;
    }
    const suggest=suggestBet(pot,eq,d.street);
    return{...sc,comment,suggest:pot>0?'推奨ベット: ポットの'+suggest.pct+'% ('+suggest.amt+'T)':''};
  }
  return{...sc,comment,suggest:''};
}

function evalCall(d,hr,human,nOpponents){
  const hc=human.holeCards;
  if(!hc||hc.length<2)return{quality:'ok',deduction:0,comment:'コール。'};
  const commLen={flop:3,turn:4,river:5}[d.street]||3;
  const comm=hr.community.slice(0,commLen);
  const adj=oppRangeAdj(hr,d.street);
  const eq=estimateEquity(hc,comm,nOpponents,400)*adj;
  const po=d.potOdds||0;
  const eqPct=Math.round(eq*100);
  const poPct=Math.round(po*100);
  const tex=boardTex(comm);
  const evalRes=hc.length&&comm.length>=3?HandEval.evaluate([...hc,...comm]):null;
  const role=evalRes?handRole(hc,comm,evalRes):{role:'unknown',note:'',isNut:false,isVuln:false};
  const sw=STREET_W[d.street]||1.0;
  const adjNote=adj<1.0?' （相手の連続ベットでレンジ補正×'+Math.round(adj*100)+'%）':'';

  const evDiff=eq-po; // EV差: プラスならコール正解
  const evDiffAbs=Math.abs(evDiff);

  if(evDiff>=0.15){
    return{quality:'good',deduction:0,comment:'正解。コール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' EV優位（+'+Math.round(evDiff*100)+'%）で明確なコールです。'};
  }
  if(evDiff>=0.05){
    return{quality:'good',deduction:Math.round(2*sw),comment:'正解。コール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' 若干のEV優位。'};
  }
  if(evDiff>=-0.05){
    // borderline: mix
    return{quality:'ok',deduction:0,comment:'コール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' ボーダーラインのコール。EV差が小さく（'+Math.round(evDiff*100)+'%）、コール/フォールドどちらも許容内です。',isMix:true};
  }
  if(evDiff>=-0.12){
    return{quality:'ok',deduction:Math.round(8*sw),comment:'やや損なコール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' EV微損（'+Math.round(evDiff*100)+'%）。',suggest:'推奨: フォールドが若干有利'};
  }
  if(evDiff>=-0.22){
    return{quality:'bad',deduction:Math.round(18*sw),comment:'【EV損失】コール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' EV損失（'+Math.round(evDiff*100)+'%）で基本的にはフォールドすべき局面。',suggest:'推奨: フォールド'};
  }
  return{quality:'bad',deduction:Math.round(28*sw),comment:'【大きなEV損失】コール（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。EV損失'+Math.round(evDiff*100)+'%。明確なフォールドスポット。',suggest:'推奨: フォールド'};
}

function evalFold(d,hr,human,nOpponents){
  const hc=human.holeCards;
  if(!hc||hc.length<2)return{quality:'ok',deduction:0,comment:'フォールド。'};
  const commLen={flop:3,turn:4,river:5}[d.street]||3;
  const comm=hr.community.slice(0,commLen);
  const adj=oppRangeAdj(hr,d.street);
  const eq=estimateEquity(hc,comm,nOpponents,400)*adj;
  const po=d.potOdds||0;
  const eqPct=Math.round(eq*100);
  const poPct=Math.round(po*100);
  const evalRes=hc.length&&comm.length>=3?HandEval.evaluate([...hc,...comm]):null;
  const role=evalRes?handRole(hc,comm,evalRes):{role:'unknown',note:'',isNut:false,isVuln:false};
  const sw=STREET_W[d.street]||1.0;
  const adjNote=adj<1.0?' （レンジ補正後）':'';
  const evDiff=eq-po;

  if(evDiff<=-0.10){
    return{quality:'good',deduction:0,comment:'正解。フォールド（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' EV的に明確なフォールドです。'};
  }
  if(evDiff<0.05){
    return{quality:'good',deduction:Math.round(2*sw),comment:'正解。フォールド（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' ボーダーラインですがフォールドが有力。'};
  }
  if(evDiff<0.12){
    return{quality:'ok',deduction:0,isMix:true,comment:'フォールド（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' コールとフォールドの混合戦略。EV差小（'+Math.round(evDiff*100)+'%）でフォールドも許容内。',suggest:'コールも検討: EQ差 +'+Math.round(evDiff*100)+'%'};
  }
  if(evDiff<0.22){
    return{quality:'bad',deduction:Math.round(18*sw),comment:'【EV損失】フォールド（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。'+role.note+' EV損失あり（'+Math.round(evDiff*100)+'%の優位をフォールド）。',suggest:'推奨: コール（必要EQ '+poPct+'% に対しEQ'+eqPct+'%）'};
  }
  return{quality:'bad',deduction:Math.round(28*sw),comment:'【大きなEV損失】フォールド（EQ約'+eqPct+'%、必要'+poPct+'%）'+adjNote+'。EV損失'+Math.round(evDiff*100)+'%。明確なコールスポット。',suggest:'推奨: コール'};
}

function evalBet(d,hr,human,nOpponents){
  const hc=human.holeCards;
  if(!hc||hc.length<2)return{quality:'ok',deduction:0,comment:'ベット。'};
  const commLen={flop:3,turn:4,river:5}[d.street]||3;
  const comm=hr.community.slice(0,commLen);
  const adj=oppRangeAdj(hr,d.street);
  const eq=estimateEquity(hc,comm,nOpponents,400)*adj;
  const pot=d.pot||0;
  const betAmt=d.amount||0;
  const betPct=pot>0?Math.round(betAmt/pot*100):0;
  const evalRes=hc.length&&comm.length>=3?HandEval.evaluate([...hc,...comm]):null;
  const role=evalRes?handRole(hc,comm,evalRes):{role:'unknown',note:'',isNut:false,isVuln:false};
  const tex=boardTex(comm);
  const isHU=nOpponents===1;
  const eqPct=Math.round(eq*100);
  const sw=STREET_W[d.street]||1.0;
  const isRiver=d.street==='river';
  const isStrong=role.role==='strong'||role.role==='nutted';

  // ---- ストリート圧力連鎖検出 ----
  const prevBetFlop=hr.decisions.some(d2=>d2.isHuman&&(d2.action==='raise'||d2.action==='allin')&&d2.street==='flop');
  const prevBetTurn=hr.decisions.some(d2=>d2.isHuman&&(d2.action==='raise'||d2.action==='allin')&&d2.street==='turn');
  const is3barrel=isRiver&&prevBetFlop&&prevBetTurn;
  const is2barrel=d.street==='turn'&&prevBetFlop;

  // ---- ヴィランチェック後のIPベット検出 ----
  // d.toCall===0 かつ、このストリートで相手が先にチェックしている場合
  const myDecIdx=hr.decisions.findIndex(d2=>d2===d);
  const villainCheckedPrior=myDecIdx>0&&hr.decisions.slice(0,myDecIdx).some(
    d2=>d2.street===d.street&&!d2.isHuman&&d2.action==='check'
  );
  const inPosCheck=d.toCall===0&&villainCheckedPrior;

  // IP判定: BTN/CO or HU(SB)
  const isIPbet=d.position==='BTN'||d.position==='CO';
  // ソルバーがベットする確率 → ベットの頻度（inPosCheck・IP補正付き）
  const betProb=solverBetProb(eq,d.street,role,tex,isHU,inPosCheck,isIPbet);
  let sc=freqToDeduction(betProb,d.street);

  // 強いハンド or IP-after-check の'ok'ゾーンは減点を60%に緩和
  if(sc.quality==='ok'&&sc.deduction>0&&(isStrong||inPosCheck)){
    sc={...sc,deduction:Math.round(sc.deduction*0.6)};
  }
  // ミディアムペアのベット: 完全なエアーほど悪くないので上限を緩和
  if(sc.quality==='bad'&&role.role==='medium'){
    const sw7=STREET_W[d.street]||1.0;
    sc={...sc,deduction:Math.min(sc.deduction,Math.round(20*sw7))};
  }

  // 理想サイズ計算
  const ideal=suggestBet(pot,eq,d.street);
  let sizeNote='';
  let sizePenalty=0;
  if(betAmt>0&&pot>0){
    const sizeDiff=Math.abs(betPct-ideal.pct);
    if(sizeDiff<=10)sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）は適切。';
    else if(betPct<ideal.pct*0.6)sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）はやや小さめ（推奨:'+ideal.pct+'%pot）。';
    else if(betPct>=100&&!role.isNut&&isRiver){
      // リバーポットベット以上かつナッツでない場合: thin valueに対して大きすぎる
      sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）。ナッツ/最強手なら有効。'+(!role.isNut?'thin valueハンドには中サイズ（50-65%pot）も検討。':'');
      sizePenalty=is3barrel?2:1; // 3barrel文脈でオーバーベットは追加減点
    }else if(betPct>ideal.pct*1.6&&betPct>100)sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）はオーバーベット。強いハンドなら有効な場合も。';
    else if(betPct>ideal.pct*1.4)sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）はやや大きめ（推奨:'+ideal.pct+'%pot）。';
    else sizeNote=' サイズ'+betAmt+'T'+'（'+betPct+'%pot）。';
  }

  // 3バレル文脈のテキスト
  let barrelNote='';
  if(is3barrel&&isStrong&&!role.isNut){
    barrelNote=' フロップ・ターン継続後の3バレル。連続ベットでレンジがpolar寄りになるため、'+(role.role==='strong'?'オーバーペア/強い手':'このハンド')+'はthin value寄りの位置付け。solverではcheck・中サイズ（50-65%pot）へ分散しやすい。';
  }else if(is2barrel&&isStrong&&!role.isNut){
    barrelNote=' ターン連続ベット。ポラライズされたレンジに対してthin valueのリバーラインを考慮。';
  }

  let comment='ベット '+betAmt+'T'+'（'+betPct+'%pot、EQ約'+eqPct+'%）。'+role.note;

  if(sc.isMix){
    comment+=' GTOソルバーではbet/checkの混合戦略（推定bet率約'+Math.round(betProb*100)+'%）。ベットは合理的な選択です。'+sizeNote+barrelNote;
    return{...sc,deduction:(sc.deduction||0)+sizePenalty,comment,suggest:''};
  }
  if(sc.quality==='good'){
    comment+=' ベットが推奨される局面です（推定bet率約'+Math.round(betProb*100)+'%）。'+sizeNote+barrelNote;
    return{...sc,deduction:(sc.deduction||0)+sizePenalty,comment,suggest:''};
  }
  if(sc.quality==='ok'){
    if(isStrong){
      comment+=' ベットは合理的な選択。checkも有力な選択肢（推定bet率約'+Math.round(betProb*100)+'%、check率約'+Math.round((1-betProb)*100)+'%）。'+sizeNote+barrelNote;
    }else{
      comment+=' チェックも有力（推定bet率約'+Math.round(betProb*100)+'%）。ベットは許容内ですがEV損失あり。'+sizeNote+barrelNote;
    }
    return{...sc,deduction:(sc.deduction||0)+sizePenalty,comment,suggest:'checkも検討（推定check率'+Math.round((1-betProb)*100)+'%'+(is3barrel?'、中サイズも選択肢':'')+'）'};
  }
  // bad: ベットすべきでない局面
  comment+=' 【EV損失】この局面でのベットは期待値損失が大きいです（推定check率約'+Math.round((1-betProb)*100)+'%）。'+sizeNote+barrelNote;
  return{...sc,deduction:(sc.deduction||0)+sizePenalty,comment,suggest:'推奨: チェック'};
}


function analyzeHand(hr){
  const human=hr.players.find(p=>p.isHuman);
  let score=100;const evals=[];
  const nOpponents=hr.players.filter(p=>!p.isHuman&&!p.folded).length||1;

  // ---- PREFLOP CONTEXT HELPERS ----
  const prefDecs=hr.decisions.filter(d=>d.street==='preflop');
  // Limpers: other players who called BB without facing a raise
  const limpCount=prefDecs.filter(d=>!d.isHuman&&d.action==='call'&&!d.facingRaise&&d.toCall>0).length;

  // Hand category for reverse implied odds analysis
  function handCat(c1,c2){
    const r1=RANK_VAL[c1.rank],r2=RANK_VAL[c2.rank];
    const s=c1.suit===c2.suit;
    const hi=Math.max(r1,r2),lo=Math.min(r1,r2);
    const gap=hi-lo;
    if(r1===r2)return r1>=12?'premium_pair':r1>=9?'mid_pair':'small_pair';
    // Premium offsuit: AKo,AQo,KQo — strong enough not to penalize
    if(!s&&hi>=13&&lo>=12)return 'premium_offsuit';
    if(s&&hi>=13&&lo>=12)return 'premium_suited'; // AKs,AQs,KQs
    if(s&&hi===14)return 'suited_ace'; // Axs
    if(s&&gap<=2)return 'suited_connector';
    // Dominated broadway: offsuit hands where lo<=J (kicker vulnerable to domination)
    // AJo,ATo,KJo,KTo,QJo,QTo,JTo,J9o,T9o etc
    if(!s&&hi>=10&&lo>=9&&lo<=11&&gap<=3)return 'dominated_broadway';
    // Ax offsuit with medium kicker (gap>3 case: ATo)
    if(!s&&hi===14&&lo>=9&&lo<=11)return 'dominated_broadway';
    return 'other';
  }

  // ストリート別の相手プレイヤー数（preflop以前にフォールドした分を除く）
  function oppsAtStreet(street){
    const sOrd=['preflop','flop','turn','river'];
    const si=sOrd.indexOf(street);
    const totalOpps=hr.players.filter(p=>!p.isHuman&&p.active).length;
    if(si<=0)return totalOpps||1;
    const foldedBefore=new Set();
    for(const dec of hr.decisions){
      if(sOrd.indexOf(dec.street)<si&&!dec.isHuman&&dec.action==='fold')
        foldedBefore.add(dec.playerName);
    }
    return Math.max(1,totalOpps-foldedBefore.size);
  }

  // Multiway 3bet pot factor: weight multiplier for OOP/multiway penalty
  function mwFactor(numIn,isOOP){
    if(numIn>=5)return isOOP?2.5:2.0;
    if(numIn>=4)return isOOP?2.0:1.6;
    if(numIn>=3)return isOOP?1.6:1.3;
    return isOOP?1.2:1.0;
  }

  for(const d of hr.decisions.filter(d=>d.isHuman)){
    const ev={...d,quality:'ok',comment:'',suggest:'',deduction:0};
    if(d.street==='preflop'){
      if(!human.holeCards||human.holeCards.length<2)continue;
      const c1=human.holeCards[0],c2=human.holeCards[1];
      const ht=handType(c1,c2),hd=handDesc(c1,c2);
      const hRank=HAND_STRENGTH[ht]||169; // 表示用ランク (1=最強, 169=最弱)
      const handFrac=HAND_COMBO_FRAC[ht]||0.99; // コンボ累積比 (0=最強側)
      const pos=d.position||'MP';
      // ポジション別GTO基準カットオフ (medium難易度, コンボ数ベース)
      const posRangePct=POS_RANGE.medium[pos]||0.20;
      const callPct=Math.min(0.70,posRangePct*1.5);
      const isInOpenRange=handFrac<=posRangePct;
      const isInCallRange=handFrac<=callPct;
      const rankStr='全169手中'+hRank+'位(上位'+Math.round(handFrac*100)+'%相当)';
      const pn=pos==='BB'?'BB':''+pos;
      const recOpen='推奨: '+Math.round(hr.bigBlind*2.5)+'〜'+Math.round(hr.bigBlind*3)+'チップのオープンレイズ（2.5〜3BB）';
      if(d.action==='fold'){
        const isFacingRaise=d.facingRaise;
        const isLimpPot=(!isFacingRaise)&&(d.toCall>0);
        if(isFacingRaise){
          if(hRank<=10){ev.quality='bad';ev.deduction=20;score-=20;ev.comment='【大きなミス】'+hd+'（'+rankStr+'）はほぼ全状況でコール/3BETすべき超強力ハンドです。';ev.suggest='推奨: 3BET';}
          else if(hRank<=20){ev.quality='bad';ev.deduction=10;score-=10;ev.comment='【やや消極的】'+hd+'（'+rankStr+'）はレイズへのコール/3BETを検討すべき強さです。';ev.suggest='推奨: コールまたは3BET';}
          else if(isInCallRange){ev.quality='ok';ev.deduction=5;score-=5;ev.comment=hd+'（'+rankStr+'）のレイズへのフォールド。'+pn+'のコールレンジ内（上位'+Math.round(callPct*100)+'%）です。';ev.suggest='推奨: コール検討';}
          else{ev.quality='ok';ev.comment=hd+'（'+rankStr+'）のレイズへのフォールド。'+pn+'のコールレンジ外なので正当な判断です。';}
        }else if(isLimpPot){
          if(isInOpenRange&&handFrac<=posRangePct-0.06){ev.quality='bad';ev.deduction=15;score-=15;ev.comment='【ミス】'+hd+'（'+rankStr+'）はリンプポットでもオーバーレイズを狙える強いハンドです。';ev.suggest='推奨: レイズ（'+(Math.round(d.toCall*3))+'チップ程度）';}
          else if(isInOpenRange){ev.quality='ok';ev.deduction=3;score-=3;ev.comment=hd+'（'+rankStr+'）のリンプポットフォールド。レイズかフォールドかは状況次第です。';}
          else{ev.quality='ok';ev.comment=hd+'（'+rankStr+'）のリンプポットフォールド。弱いハンドへの正当な判断です。';}
        }else{
          if(isInOpenRange&&handFrac<=posRangePct-0.09){ev.quality='bad';ev.deduction=25;score-=25;ev.comment='【大きなミス】'+hd+'（'+rankStr+'）は'+pn+'のコアオープンレンジです。フォールドは大きなEV損失です。';ev.suggest=recOpen;}
          else if(isInOpenRange){ev.quality='bad';ev.deduction=15;score-=15;ev.comment='【ミス】'+hd+'（'+rankStr+'）は'+pn+'のオープンレンジ内です（上位'+Math.round(posRangePct*100)+'%）。';ev.suggest=recOpen;}
          else if(handFrac<=posRangePct+0.05){ev.quality='ok';ev.comment=hd+'（'+rankStr+'）の'+pn+'フォールドはボーダーライン（境界: 上位'+Math.round(posRangePct*100)+'%）。オープン推奨ですが状況次第。';}
          else if(handFrac>=posRangePct+0.12){ev.quality='good';ev.comment='正解。'+hd+'（'+rankStr+'）は'+pn+'のオープンレンジ外（上位'+Math.round(posRangePct*100)+'%まで）です。';}
          else{ev.quality='ok';ev.comment=hd+'（'+rankStr+'）の'+pn+'フォールドはボーダーライン（境界: 上位'+Math.round(posRangePct*100)+'%付近）。';}
        }
      }else if(d.action==='call'&&d.amount>0&&d.potOdds<0.5){
        if(pos==='BB'){
          if(hRank<=20){ev.quality='good';ev.comment='正解。'+hd+'（'+rankStr+'）のBBディフェンスコールは妥当。3BETも選択肢。';}
          else if(hRank<=50){ev.quality='ok';ev.comment=hd+'（'+rankStr+'）のBBディフェンス。ポットオッズ次第でコールまたはフォールド。';}
          else if(hRank>=100){ev.quality='bad';ev.deduction=10;score-=10;ev.comment='【ミス】'+hd+'（'+rankStr+'）はBBでも弱すぎます。';ev.suggest='推奨: フォールド';}
          else{ev.quality='ok';ev.comment=hd+'（'+rankStr+'）のBBコール。ボーダーラインのディフェンスです。';}
        }else if(!d.facingRaise){
          if(isInOpenRange){ev.quality='bad';ev.deduction=10;score-=10;ev.comment='【消極的】'+hd+'（'+rankStr+'）はリンプでなく'+pn+'からオープンレイズすべきです。';ev.suggest='推奨: '+(Math.round(hr.bigBlind*2.5))+'〜'+(Math.round(hr.bigBlind*3))+'チップのオープン';}
          else{ev.quality='ok';ev.comment=hd+'（'+rankStr+'）のリンプ。基本はフォールドかレイズを推奨。';}
        }else{
          // ---- Facing raise call: multiway + dominated broadway analysis ----
          const suited2=human.holeCards[0].suit===human.holeCards[1].suit;
          const hcat=handCat(c1,c2);
          const isOOP=['SB','BB','UTG','UTG+1'].includes(pos);
          // Count players who called the same 3bet/raise (toCall > 2BB = called a raise)
          const otherCallers=prefDecs.filter(pd=>!pd.isHuman&&pd.action==='call'&&pd.facingRaise&&pd.toCall>hr.bigBlind*2).length;
          const estPlayersIn=otherCallers+2; // +1 raiser + human
          const isMultiway3bet=estPlayersIn>=3||limpCount>=2;
          const mw=mwFactor(estPlayersIn,isOOP);
          const isDomBway=hcat==='dominated_broadway';
          // Deduction cap: max 25 to avoid one-action wipeout
          const rioMultiplier=Math.min(mw,2.0);

          // Reverse implied odds penalty for dominated broadway OOP/multiway
          if(isDomBway&&isMultiway3bet&&isOOP){
            const ded=Math.min(25,Math.round(15*rioMultiplier));
            ev.quality='bad';ev.deduction=ded;score-=ded;
            ev.comment='【大きなミス】'+hd+'（'+rankStr+'）はオフスーツブロードウェイ系で逆インプライドオッズが大。OOP×マルチウェイ3betポットでは大幅EV損失（推定'+ded+'点）。ドミネートされやすく、ナッツになりにくい。';
            ev.suggest='推奨: フォールド（コールEVは大幅マイナス）';
          }else if(isDomBway&&isOOP){
            const ded=10;
            ev.quality='bad';ev.deduction=ded;score-=ded;
            ev.comment='【注意】'+hd+'（'+rankStr+'）はOOPでの3bet/レイズコール。オフスーツブロードウェイはドミネートされやすく逆インプライドオッズが大きい。HU IPなら許容できるが、OOPでは基本フォールド推奨。';
            ev.suggest='推奨: フォールド';
          }else if(isDomBway&&isMultiway3bet){
            const ded=12;
            ev.quality='bad';ev.deduction=ded;score-=ded;
            ev.comment='【注意】'+hd+'（'+rankStr+'）のマルチウェイコール。オフスーツブロードウェイはマルチウェイで逆インプライドオッズが激増。ナッツを作りにくく、作れてもドミネートされる可能性が高い。';
            ev.suggest='推奨: フォールド';
          }else if(isMultiway3bet&&isOOP&&handFrac>posRangePct-0.05){
            const ded=8;
            ev.quality='ok';ev.deduction=ded;score-=ded;
            ev.comment=hd+'（'+rankStr+'）のOOPマルチウェイコール（推定'+estPlayersIn+'人）。ナッツになりにくいハンドはequity realizationが低下しEV損失になりやすい。';
            ev.suggest='推奨: フォールドまたは3BET';
          }else if(handFrac<=callPct-0.06){
            ev.quality='good';ev.comment='正解。'+hd+'（'+rankStr+'）の'+pn+'コールは妥当なディフェンスです。';
          }else if(handFrac<=callPct){
            ev.quality='ok';ev.comment=hd+'（'+rankStr+'）の'+pn+'コールはボーダーライン。3BETも検討。';
          }else{
            ev.quality='bad';ev.deduction=10;score-=10;ev.comment='【消極的】'+hd+'（'+rankStr+'）はコールより3BETを検討してください。';ev.suggest='推奨: 3BET';
          }
        }
      }else if(d.action==='raise'||d.action==='allin'){
        const suited=human.holeCards[0].suit===human.holeCards[1].suit;
        const is3bet=d.facingRaise&&d.toCall>0;
        const isISO=!is3bet&&limpCount>=2;
        const isOOP_r=['SB','BB','UTG','UTG+1'].includes(pos);
        const hcat_r=handCat(c1,c2);
        const isDomBway_r=hcat_r==='dominated_broadway';
        const actionLabel=is3bet?'3BET':(pos==='BB'?'3BET/レイズ':isISO?'ISOレイズ':'オープン');

        // レンジ内かどうかでの評価 (コンボフラクションベース)
        // 3BET: 上位6%コンボが標準的な3betレンジ
        const threeBetPct3=0.06;
        const is3betRange=handFrac<=threeBetPct3;
        // ISO/open: posRangePctで判定 (+0.03はISOの余裕)
        const effectivePct=is3bet?threeBetPct3:isISO?posRangePct+0.03:posRangePct;
        const marginPct=effectivePct-handFrac; // 正=レンジ内, 負=レンジ外

        const stdOpen=Math.round(hr.bigBlind*2.5)||15;
        let sizeNote='';
        if(d.amount>0){
          if(is3bet){
            const std3bet=Math.round(d.toCall*3);
            const lo=Math.round(d.toCall*2.4),hi=Math.round(d.toCall*3.8);
            if(d.amount<lo)sizeNote=' 3BETサイズ'+d.amount+'チップは小さめ（推奨: '+std3bet+'チップ前後）。';
            else if(d.amount>hi)sizeNote=' 3BETサイズ'+d.amount+'チップはやや大きめ（推奨: '+std3bet+'チップ前後）。';
            else sizeNote=' 3BETサイズ（相手の約'+Math.round(d.amount/d.toCall*10)/10+'倍）は適切。';
          }else if(isISO){
            const isoBase=Math.round(hr.bigBlind*(3+limpCount));
            if(d.amount<isoBase*0.7)sizeNote=' ISOサイズ'+d.amount+'チップは小さめ（推奨: '+isoBase+'チップ前後）。';
            else if(d.amount>isoBase*1.6)sizeNote=' ISOサイズ'+d.amount+'チップはやや大きめ（推奨: '+isoBase+'チップ前後）。';
            else sizeNote=' ISOサイズ（'+limpCount+'リンパー対）はほぼ適切。';
          }else if(pos!=='BB'){
            if(d.amount<stdOpen*0.8)sizeNote=' オープンサイズ'+d.amount+'チップは小さめ（推奨: '+stdOpen+'〜'+(stdOpen+5)+'チップ）。';
            else if(d.amount>stdOpen*1.8)sizeNote=' オープンサイズ'+d.amount+'チップはやや大きめ（推奨: '+stdOpen+'〜'+(stdOpen+5)+'チップ）。';
            else sizeNote=' サイズ（'+Math.round(d.amount/hr.bigBlind*10)/10+'BB）は適切。';
          }
        }

        let isoNote='';
        if(isISO&&isOOP_r&&isDomBway_r){
          isoNote=' ただし'+hd+'はOOP ISOでは逆インプライドオッズが大きい点に注意。';
        }else if(isISO&&isOOP_r&&limpCount>=3){
          isoNote=' '+limpCount+'リンパーへのOOP ISOはマルチウェイ化リスクあり。';
        }else if(isISO){
          isoNote=' ISOレイズ（'+limpCount+'リンパー相手）。';
        }

        // スーテッドエースの3BETブラフ (A5s-A2s)
        const is3betBluffOK=is3bet&&hcat_r==='suited_ace'&&['BTN','CO','HJ'].includes(pos)&&hRank>=40&&hRank<=55;
        if(is3betBluffOK){
          ev.quality='ok';ev.comment='スーテッドエースの3BETブラフ（'+hd+'、'+rankStr+'）。A5s-A2s等はGTO的に標準的なブラフ3BETレンジです。Aブロッカー効果もあり。'+sizeNote;
        }else if(marginPct>=0.09&&!(isISO&&isOOP_r&&isDomBway_r)){
          ev.quality='good';ev.comment='正解。'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'はコアレンジです。'+sizeNote+isoNote;
        }else if(marginPct>=0.03&&!(isISO&&isOOP_r&&isDomBway_r)){
          ev.quality='good';ev.comment='正解。'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'は妥当です。'+sizeNote+isoNote;
        }else if(marginPct>=0&&isISO&&isOOP_r&&isDomBway_r){
          const ded=5;ev.quality='ok';ev.deduction=ded;score-=ded;
          ev.comment='【ボーダー】'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'はOOPオフスーツブロードウェイのISOで利益幅が薄い。'+sizeNote+isoNote;
        }else if(marginPct>=-0.03){
          const ded=isISO&&isOOP_r&&isDomBway_r?8:4;
          ev.quality=ded>=8?'bad':'ok';ev.deduction=ded;score-=ded;
          ev.comment='【ボーダー】'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'はボーダーライン（境界: 上位'+Math.round(effectivePct*100)+'%）。'+(!suited&&!is3bet?'オフスーツは弱め。':'')+sizeNote+isoNote;
        }else if(marginPct>=-0.07){
          ev.quality='bad';ev.deduction=10;score-=10;
          ev.comment='【注意】'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'はレンジ外です（境界: 上位'+Math.round(effectivePct*100)+'%、現在'+Math.round(handFrac*100)+'%相当）。'+sizeNote+isoNote;
          ev.suggest='推奨: フォールドまたは慎重に';
        }else{
          ev.quality='bad';ev.deduction=15;score-=15;
          ev.comment='【ミス】'+hd+'（'+rankStr+'）の'+pn+' '+actionLabel+'は弱すぎます（上位'+Math.round(effectivePct*100)+'%レンジ外）。';
          ev.suggest='推奨: フォールド';
        }
      }else{
        ev.quality='ok';ev.comment=hd+'（'+rankStr+'）の'+pn+' '+({fold:'フォールド',call:'コール',check:'チェック',raise:'レイズ',allin:'オールイン'}[d.action]||d.action)+'。';
      }
    }else{
      // ポストフロップ - 新レンジベース評価
      const hasOdds=d.potOdds>0;
      const streetOpps=oppsAtStreet(d.street); // ストリート別相手数
      let result=null;
      if(d.action==='check'){
        result=evalCheck(d,hr,human,streetOpps);
      }else if(d.action==='call'&&hasOdds){
        result=evalCall(d,hr,human,streetOpps);
      }else if(d.action==='fold'&&hasOdds){
        result=evalFold(d,hr,human,streetOpps);
      }else if(d.action==='raise'||d.action==='allin'||d.action==='bet'){
        result=evalBet(d,hr,human,streetOpps);
      }else if(d.action==='fold'&&!hasOdds){
        ev.quality='bad';ev.deduction=5;score-=5;ev.comment='チェックの後にフォールドはできません（操作ミス）。';
      }else{
        ev.quality='ok';ev.comment=({fold:'フォールド。',check:'チェック。',raise:'ベット。',bet:'ベット。',allin:'オールイン。',call:'コール。'}[d.action]||'');
      }
      if(result){
        ev.quality=result.quality;
        ev.comment=result.comment;
        ev.deduction=result.deduction||0;
        if(result.suggest)ev.suggest=result.suggest;
        if(result.quality==='bad')score-=(result.deduction||8);
        else if(result.quality==='ok'&&result.deduction)score-=result.deduction;
      }
    }
    evals.push(ev);
  }
  score=Math.max(0,Math.min(100,score));
  const badEvals=evals.filter(e=>e.quality==='bad');
  const badCount=badEvals.length;
  let worstDeduction=0;
  {let tmp=100;for(const ev of evals){const prev=tmp;if(ev.quality==='bad'){tmp-=(ev.deduction||8);worstDeduction=Math.max(worstDeduction,prev-tmp);}}}
  let maxGrade='S';
  if(worstDeduction>=20||badCount>=3)maxGrade='C';
  else if(worstDeduction>=12||badCount>=2)maxGrade='B';
  else if(badCount>=1)maxGrade='A';
  let grade,gl;
  const gradeOrder=['S','A','B','C','D','F'];
  // ミックス戦略スポットでのok減点を考慮し、S基準を引き上げ
  // EV損失ベース採点: mixスポットは減点なし、明確ミスのみ減点
  const hasClearMistake=evals.some(e=>e.quality==='bad');
  const hasMixPenalty=evals.some(e=>e.quality==='ok'&&e.deduction>0);
  if(score>=97&&!hasClearMistake){grade='S';gl='ほぼ最善のプレイ。EV損失がほぼゼロです';}
  else if(score>=90){grade='A';gl='良いプレイ。小さなEV損失がありますが戦略思想は正しいです';}
  else if(score>=75){grade='B';gl='中程度のEV損失。改善できる局面があります';}
  else if(score>=50){grade='C';gl='大きなEV損失。レンジ構造を見直してください';}
  else if(score>=35){grade='D';gl='深刻なミスがあります。基礎理論を見直してください';}
  else{grade='F';gl='根本的な問題があります。GTOレッスンから始めましょう';}
  if(gradeOrder.indexOf(grade)<gradeOrder.indexOf(maxGrade))grade=maxGrade;
  const glMap={S:'完璧に近いプレイ。GTOに準拠しています',A:'良いプレイ。細かいミスが数点あります',B:'平均的。改善できるポイントが複数あります',C:'ミスが目立つ。アナリシスをよく読んでください',D:'深刻なミスがあります。基礎理論を見直してください',F:'根本的な問題があります。GTOレッスンから始めましょう'};
  gl=glMap[grade]||gl;
  return{grade,gradeLabel:gl,score,evals,human,hr};
}
